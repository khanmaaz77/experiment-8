<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book API</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Book Collection REST API</h1>

    <div class="card">
      <h2>Available API Routes</h2>

      <table>
        <tr>
          <th>Method</th>
          <th>Route</th>
          <th>Description</th>
        </tr>

        <tr>
          <td>GET</td>
          <td>/books</td>
          <td>Get all books</td>
        </tr>

        <tr>
          <td>GET</td>
          <td>/books/:id</td>
          <td>Get single book</td>
        </tr>

        <tr>
          <td>POST</td>
          <td>/books</td>
          <td>Add new book</td>
        </tr>

        <tr>
          <td>PUT</td>
          <td>/books/:id</td>
          <td>Update book</td>
        </tr>

        <tr>
          <td>DELETE</td>
          <td>/books/:id</td>
          <td>Delete book</td>
        </tr>

      </table>
    </div>
  </div>

</body>
</html>
